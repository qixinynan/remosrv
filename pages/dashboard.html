<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RemoSrv 控制台</title>
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
</head>
<body>
  <div class="shell shell-3col">
    <aside class="sidebar">
      <div class="brand">RemoSrv</div>
      <nav class="menu">
        <a class="menu-item active" href="/">控制台</a>
        <a class="menu-item" href="/files">文件管理</a>
      </nav>
      <button id="logoutBtn" class="ghost">退出登录</button>
    </aside>

    <main class="center terminal-layout">
      <section class="terminal-card">
        <header class="terminal-head">
          <h2>Activity</h2>
          <button id="clearLogs" class="ghost">清空</button>
        </header>

        <div id="logs" class="logs terminal-logs"></div>

        <div class="terminal-bottom">
          <div class="shortcut-strip">
            <span class="muted">快捷命令</span>
            <div id="quickStrip" class="quick-strip"></div>
          </div>

          <form id="commandForm" class="terminal-form">
            <span class="prompt">&gt;</span>
            <input id="commandInput" class="terminal-input" placeholder="输入命令，支持上下键历史" autocomplete="off" required />
            <button type="submit">发送</button>
          </form>

          <label class="inline-check">
            <input id="cmdMode" type="checkbox" checked />
            <span>普通输入自动包装为 <code>#...</code></span>
          </label>
        </div>
      </section>
    </main>

    <aside class="right-panel">
      <section class="card right-card">
        <div class="card-header">
          <h3>在线设备</h3>
          <strong id="rightOnlineCount">0</strong>
        </div>
        <ul id="rightDeviceList" class="device-list"></ul>
      </section>

      <section class="card right-card">
        <div class="card-header">
          <h3>快捷命令管理</h3>
        </div>
        <form id="shortcutForm" class="shortcut-form">
          <input id="shortcutName" placeholder="名称" required />
          <input id="shortcutCommand" placeholder="命令" required />
          <button type="submit" id="shortcutSubmit">保存</button>
          <button type="button" id="shortcutCancel" class="ghost hidden">取消</button>
        </form>
        <ul id="rightShortcutList" class="shortcut-list"></ul>
      </section>
    </aside>
  </div>

  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/dashboard.js"></script>
</body>
</html>
