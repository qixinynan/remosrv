<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Device Console</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="layout">
    <section class="panel side">
      <h1>Remote Console</h1>
      <p class="sub">Browser control panel</p>

      <div class="card">
        <div class="row">
          <span>Online Devices</span>
          <strong id="onlineCount">0</strong>
        </div>
        <ul id="deviceList" class="device-list"></ul>
      </div>

      <div class="card">
        <h2>Shortcuts</h2>
        <form id="shortcutForm" class="form">
          <input id="shortcutName" placeholder="Name" required />
          <input id="shortcutCommand" placeholder="Command" required />
          <button type="submit" id="shortcutSubmit">Save Shortcut</button>
          <button type="button" id="shortcutCancel" class="ghost hidden">Cancel Edit</button>
        </form>
        <ul id="shortcutList" class="shortcut-list"></ul>
      </div>
    </section>

    <section class="panel main">
      <div class="card">
        <h2>Run Command</h2>
        <form id="commandForm" class="command-row">
          <input id="commandInput" placeholder="Type command, e.g. !ls or custom payload" required />
          <button type="submit">Send</button>
        </form>
        <label class="inline-check">
          <input id="cmdMode" type="checkbox" checked />
          <span>默认按 CMD 执行（自动包装为 <code>!cmd ...</code>）</span>
        </label>
        <p class="hint">提示：如果你要让设备执行系统命令，请使用 <code>!cmd your-command</code>。</p>
      </div>

      <div class="card">
        <h2>File Browser (CMD)</h2>
        <div class="file-tools">
          <select id="fileDevice"></select>
          <input id="filePath" placeholder="C:\\" value="C:\\" />
          <button id="fileLoad" type="button">Load</button>
          <button id="fileUp" class="ghost" type="button">Up</button>
        </div>
        <div class="row">
          <small id="fileMeta">Select device and load path.</small>
        </div>
        <ul id="fileList" class="file-list"></ul>
      </div>

      <div class="card logs-card">
        <div class="row">
          <h2>Activity</h2>
          <button id="clearLogs" class="ghost">Clear View</button>
        </div>
        <div id="logs" class="logs"></div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
